version: '3.8'

services:
  
  ws-backend:
    image: adinathd/excalidraww-ws:latest
    build:
      context: .
      dockerfile: docker/ws-backend.Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    

  http-backend:
    image: adinathd/excalidraww-http:latest
    build:
      context: .
      dockerfile: docker/http-backend.Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    

  excalidraw-frontend:
    image: adinathd/excalidraww-frontend:latest
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        - NEXT_PUBLIC_HTTP_URL=${NEXT_PUBLIC_HTTP_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_HTTP_URL=${NEXT_PUBLIC_HTTP_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}

